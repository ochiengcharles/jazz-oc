<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jazz OC · business chat</title>
    <!-- Font Awesome 6 (Free) for professional, colourful icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Font: Inter (clean, modern, business friendly) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* --- vibrant, professional palette — trustworthy + energetic --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Poppins', system-ui, sans-serif;
        }

        :root {
            --gradient-brand: linear-gradient(145deg, #1e2b5e, #283b8b);
            --accent-electric: #4f46e5;
            --accent-sunset: #f97316;
            --accent-rose: #ec4899;
            --accent-teal: #14b8a6;
            --bg-soft: #f4f7fd;
            --bubble-mine: #e0edff;
            --bubble-theirs: #ffffff;
            --card-white: #ffffff;
            --text-dark: #0b1e33;
            --text-medium: #334155;
            --text-light: #64748b;
            --border-light: #e9eef4;
            --shadow-card: 0 12px 30px rgba(0, 20, 50, 0.1);
            --header-height: 70px;
        }

        body {
            background: linear-gradient(145deg, #e9eefa 0%, #dbe5f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: var(--text-dark);
        }

        /* --- header --- */
        header {
            width: 100%;
            background: var(--gradient-brand);
            color: white;
            padding: 0 28px;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            z-index: 30;
            box-shadow: 0 6px 18px rgba(0, 20, 50, 0.25);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: rgba(255, 255, 255, 0.15);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #ffb96e;
            border: 1px solid rgba(255,215,150,0.5);
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(130deg, #fff, #ffe6b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #auth-status {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.06);
            padding: 4px 4px 4px 16px;
            border-radius: 100px;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 4px 8px 4px 4px;
            border-radius: 40px;
            transition: background 0.2s;
        }
        .user-profile-mini:hover {
            background: rgba(255,255,255,0.1);
        }

        .user-avatar-mini {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f97316, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            overflow: hidden;
            text-transform: uppercase;
        }
        .user-avatar-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #user-display-name {
            font-weight: 500;
            font-size: 0.95rem;
        }

        #auth-button {
            background: white;
            color: #1e2b5e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid rgba(255,255,240,0.6);
        }
        #auth-button:hover { background: #fff7e8; }

        /* --- Profile Modal --- */
        #profile-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 15, 41, 0.8);
            backdrop-filter: blur(8px);
            display: none; justify-content: center; align-items: center;
            z-index: 300;
        }
        .profile-box {
            background: var(--card-white);
            padding: 40px;
            border-radius: 36px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(20, 40, 100, 0.5);
        }
        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1e2b5e, #4f46e5);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 600;
            color: white;
            border: 4px solid #ffb96e;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            text-transform: uppercase;
        }
        .avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 8px;
            font-size: 0.8rem;
            transform: translateY(100%);
            transition: transform 0.2s;
        }
        .avatar-large:hover .avatar-overlay {
            transform: translateY(0);
        }
        .profile-box input {
            width: 100%;
            padding: 16px 20px;
            margin: 12px 0;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            font-size: 1rem;
        }
        .profile-box input:focus {
            border-color: #4f46e5;
            outline: none;
        }

        /* --- login overlay --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8, 15, 41, 0.8);
            backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 200;
        }

        .login-box {
            background: var(--card-white);
            padding: 40px 38px;
            border-radius: 36px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(20, 40, 100, 0.5);
        }

        .login-box i:first-child { font-size: 50px; color: #4f46e5; background: #e0e7ff; padding: 18px; border-radius: 60px; margin-bottom: 15px; }
        .login-box h3 { font-size: 2rem; font-weight: 700; background: linear-gradient(145deg, #1e2b5e, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .login-box input { width: 100%; padding: 16px 20px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 40px; font-size: 1rem; }
        .login-box input:focus { border-color: #4f46e5; outline: none; }
        .login-box button { width: 100%; padding: 16px; border-radius: 60px; border: none; font-weight: 700; margin-top: 12px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #1e2b5e; color: white; }
        .btn-primary:hover { background: #283b8b; }
        .btn-outline { background: #f1f5f9; color: #1e293b; border: 2px solid #cbd5e1; }
        .btn-warning { background: #f59e0b; color: white; }
        #auth-error { margin-top: 16px; color: #e11d48; font-weight: 500; }
        .reset-message { margin-top: 20px; padding: 15px; border-radius: 40px; font-weight: 500; }
        .reset-message.success { background: #d1fae5; color: #065f46; }
        .reset-message.error { background: #fee2e2; color: #991b1b; }

        /* --- chat container --- */
        #chat-box {
            width: 100%;
            max-width: 1000px;
            flex: 1;
            overflow-y: auto;
            padding: calc(var(--header-height) + 20px) 20px 120px 20px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
        }

        /* message bubbles */
        .msg {
            margin: 10px 0;
            padding: 12px 16px 28px 16px;
            border-radius: 28px;
            max-width: 70%;
            word-wrap: break-word;
            box-shadow: 0 6px 14px rgba(0,20,40,0.08);
            position: relative;
            border: 1px solid rgba(255,255,255,0.7);
            line-height: 1.5;
            min-height: 70px;
        }

        .msg.mine {
            background: var(--bubble-mine);
            align-self: flex-end;
            border-bottom-right-radius: 8px;
        }

        .msg.theirs {
            background: var(--bubble-theirs);
            align-self: flex-start;
            border-bottom-left-radius: 8px;
        }

        .msg.selected-for-reply { box-shadow: 0 0 0 4px #4f46e5; }

        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            overflow: hidden;
            flex-shrink: 0;
            text-transform: uppercase;
        }
        
        .msg-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .msg-name {
            font-weight: 700;
            font-size: 0.95rem;
            flex: 1;
        }

        .reply-context {
            border-left: 6px solid #4f46e5;
            background: #f0f4ff;
            padding: 10px 12px;
            margin: 0 0 10px 0;
            border-radius: 16px;
            font-size: 0.9rem;
        }

        .msg-content {
            display: block;
            margin-bottom: 20px;
            word-break: break-word;
            padding-left: 36px;
        }

        .msg.mine .msg-content {
            padding-left: 0;
            padding-right: 36px;
        }

        .msg-info {
            font-size: 0.7rem;
            color: var(--text-light);
            position: absolute;
            bottom: 8px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.7);
            padding: 3px 10px 3px 8px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .delivered-check { color: #14b8a6; }
        .delete-btn { background: none; border: none; color: #ec4899; cursor: pointer; }

        audio { border-radius: 30px; max-width: 220px; height: 40px; }
        .msg img { border-radius: 20px; max-width: 220px; }

        /* --- input area --- */
        #input-container {
            width: 100%;
            max-width: 1000px;
            position: fixed;
            bottom: 18px;
            z-index: 40;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        #reply-preview {
            background: white;
            border-radius: 60px;
            padding: 14px 25px;
            margin-bottom: 8px;
            width: 90%;
            max-width: 800px;
            border: 2px solid #4f46e5;
            display: none;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.9);
            pointer-events: all;
        }

        #clear-reply { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #94a3b8; }

        #input-area {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            padding: 12px 22px;
            border-radius: 120px;
            box-shadow: var(--shadow-card);
            width: 95%;
            max-width: 900px;
            border: 2px solid rgba(255,255,255,0.9);
            pointer-events: all;
        }

        .action-button, .send-button, .attach-label {
            width: 52px; height: 52px; border-radius: 60px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; cursor: pointer; border: none;
            background: white; color: #1e2b5e;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
        .send-button { background: #1e2b5e; color: white; }

        #voice-note-button.recording { background: #f97316; color: white; animation: pulse-rec 1.4s infinite; }
        @keyframes pulse-rec { 0% { box-shadow: 0 0 0 0 #f97316; } 70% { box-shadow: 0 0 0 14px rgba(249,115,22,0.3); } }

        #message {
            flex: 1;
            padding: 14px 24px;
            border-radius: 60px;
            border: none;
            background: #f8fafc;
            font-size: 1rem;
            margin: 0 10px;
        }
        #message:focus { outline: none; background: white; }

        #logged-out-message {
            background: #fee2e2;
            border-radius: 60px;
            padding: 18px 32px;
            font-weight: 600;
            color: #b91c1c;
            width: fit-content;
            margin: 0 auto;
            pointer-events: all;
        }

        #loading-indicator {
            background: white;
            border-radius: 60px;
            padding: 12px 28px;
            color: #4f46e5;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 10px auto;
        }

        @media (max-width: 600px) {
            .msg { max-width: 85%; }
            .msg-content { padding-left: 32px; }
            .msg.mine .msg-content { padding-right: 32px; }
        }
    </style>
</head>
<body>

<!-- PROFILE MODAL -->
<div id="profile-modal">
    <div class="profile-box">
        <h3 style="margin-bottom: 20px; color: #1e2b5e;">Edit Profile</h3>
        
        <div class="avatar-large" id="profile-avatar-large" onclick="document.getElementById('avatar-upload').click()">
            <img id="avatar-preview" src="" style="display: none;">
            <span id="avatar-initial"></span>
            <div class="avatar-overlay"><i class="fas fa-camera"></i> Change photo</div>
        </div>
        <input type="file" id="avatar-upload" accept="image/*" style="display: none;" onchange="uploadAvatar(event)">
        
        <input type="text" id="profile-username" placeholder="Username" value="">
        <input type="email" id="profile-email" placeholder="Email" value="" disabled style="background: #f1f5f9;">
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button class="btn-primary" style="flex:1;" onclick="saveProfile()"><i class="fas fa-save"></i> Save</button>
            <button class="btn-outline" style="flex:1;" onclick="closeProfileModal()"><i class="fas fa-times"></i> Close</button>
        </div>
        <p id="profile-message" style="margin-top: 15px; color: #10b981;"></p>
    </div>
</div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="display: none;">
    <div class="login-box">
        <i class="fas fa-comment-dots"></i>
        <h3>Jazz OC</h3>
        <p>Sign in with your work email</p>
        <input type="email" id="login-email" placeholder="Email address">
        <input type="password" id="login-password" placeholder="Password">
        <button class="btn-primary" onclick="loginUser()"><i class="fas fa-sign-in-alt"></i> Login</button>
        <button class="btn-outline" onclick="showForgotPassword()"><i class="fas fa-redo-alt"></i> Forgot password?</button>
        <button class="btn-primary" onclick="registerUser()" style="background: #f97316;"><i class="fas fa-user-plus"></i> Register</button>
        <p id="auth-error"></p>
    </div>
</div>

<!-- FORGOT PASSWORD OVERLAY -->
<div id="forgot-password-overlay" style="display: none;">
    <div class="login-box">
        <i class="fas fa-key" style="color: #f59e0b; background: #fef3c7;"></i>
        <h3 style="font-size: 1.8rem;">Reset Password</h3>
        <p>Enter your email address and we'll send you a password reset link.</p>
        <input type="email" id="reset-email" placeholder="Your work email" value="">
        <button class="btn-warning" onclick="sendPasswordReset()"><i class="fas fa-paper-plane"></i> Send Reset Email</button>
        <button class="btn-outline" onclick="hideForgotPassword()" style="margin-top: 8px;"><i class="fas fa-arrow-left"></i> Back to Login</button>
        <div id="reset-message" style="margin-top: 15px;"></div>
    </div>
</div>

<!-- HEADER -->
<header>
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-phone-alt"></i></div>
        <span class="logo-text">jazz oc</span>
    </div>
    <div id="auth-status">
        <div class="user-profile-mini" id="profile-button" onclick="openProfileModal()" style="display: none;">
            <div class="user-avatar-mini" id="user-avatar-mini">
                <span id="avatar-mini-initial"></span>
                <img id="avatar-mini-img" src="" style="display: none;">
            </div>
            <span id="user-display-name">Loading...</span>
        </div>
        <button id="auth-button" onclick="toggleAuthUI()"><i class="fas fa-right-to-bracket"></i> Login</button>
    </div>
</header>

<!-- MAIN CHAT CONTAINER -->
<div id="chat-box">
    <div id="loading-indicator"><i class="fas fa-spinner fa-pulse"></i> Loading conversation...</div>
</div>

<!-- BOTTOM INPUT AREA -->
<div id="input-container">
    <div id="reply-preview">
        <i class="fas fa-reply"></i>
        <span id="reply-preview-name" style="font-weight:600;">User</span>
        <span id="reply-preview-text" style="color:#334155;">message preview</span>
        <button id="clear-reply" onclick="clearReply()"><i class="fas fa-times-circle"></i></button>
    </div>

    <div id="logged-out-message" style="display: none;">
        <i class="fas fa-lock" style="margin-right: 8px;"></i> Please log in to send messages
    </div>

    <div id="input-area" style="display: none;">
        <input type="file" id="file-input" style="display: none;" onchange="uploadFile(event.target.files[0])">
        <label for="file-input" class="attach-label" title="Attach file"><i class="fas fa-paperclip"></i></label>

        <button class="action-button" id="voice-note-button" onclick="startVoiceRecording()" title="Voice note"><i class="fas fa-microphone-alt"></i></button>
        
        <input id="message" type="text" placeholder="Type a message..." onkeypress="if(event.key === 'Enter') sendMessage();">
        
        <button class="send-button" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyB2qanJDBrq4SsMv6DGxnOSzbJpi0cCmWo",
        authDomain: "let-s-chat-dc06f.firebaseapp.com",
        projectId: "let-s-chat-dc06f",
        storageBucket: "let-s-chat-dc06f.firebasestorage.app",
        messagingSenderId: "156635062723",
        appId: "1:156635062723:web:4c47cb160d3af0de46dd76",
        databaseURL: "https://let-s-chat-dc06f-default-rtdb.firebaseio.com/"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const storage = firebase.storage();
    const messagesRef = db.ref("messages");

    // UI Elements
    const chatBox = document.getElementById("chat-box");
    const loginOverlay = document.getElementById("login-overlay");
    const forgotPasswordOverlay = document.getElementById("forgot-password-overlay");
    const profileModal = document.getElementById("profile-modal");
    const authError = document.getElementById("auth-error");
    const messageInput = document.getElementById('message');
    const voiceNoteButton = document.getElementById('voice-note-button');
    const loadingIndicator = document.getElementById('loading-indicator');
    const userDisplayName = document.getElementById("user-display-name");
    const authButton = document.getElementById("auth-button");
    const inputArea = document.getElementById("input-area");
    const loggedOutMessage = document.getElementById("logged-out-message");
    const resetMessage = document.getElementById("reset-message");
    const profileButton = document.getElementById("profile-button");
    const avatarMiniInitial = document.getElementById("avatar-mini-initial");
    const avatarMiniImg = document.getElementById("avatar-mini-img");
    const avatarPreview = document.getElementById("avatar-preview");
    const avatarInitial = document.getElementById("avatar-initial");
    const profileUsername = document.getElementById("profile-username");
    const profileEmail = document.getElementById("profile-email");

    let currentUser = null;
    let replyToMessage = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let audioStream = null;
    
    // Cache for user profiles
    const userProfileCache = {};

    // Helper: Get user initial
    function getUserInitial(name) {
        if (!name) return '?';
        return name.charAt(0).toUpperCase();
    }

    // Helper: Generate consistent color for user
    function getUserAvatarColor(uid) {
        const colors = ['#4f46e5', '#f97316', '#ec4899', '#14b8a6', '#8b5cf6', '#0891b2', '#7c3aed', '#db2777'];
        let hash = 0;
        for (let i = 0; i < uid.length; i++) {
            hash = ((hash << 5) - hash) + uid.charCodeAt(i);
            hash |= 0;
        }
        return colors[Math.abs(hash) % colors.length];
    }

    // Load user profile
    async function loadUserProfile(uid) {
        if (userProfileCache[uid]) return userProfileCache[uid];
        
        try {
            const snapshot = await db.ref(`users/${uid}`).once('value');
            const data = snapshot.val();
            const profile = {
                displayName: data?.displayName || 'User',
                avatarURL: data?.avatarURL || null,
                email: data?.email || '',
                color: getUserAvatarColor(uid)
            };
            userProfileCache[uid] = profile;
            return profile;
        } catch (error) {
            console.warn("Error loading profile:", error);
            return {
                displayName: 'User',
                avatarURL: null,
                email: '',
                color: getUserAvatarColor(uid)
            };
        }
    }

    // Render message with avatar
    async function renderMessage(id, data) {
        if (document.getElementById(id)) return;
        
        const isMine = currentUser && data.uid === currentUser.uid;
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMine ? 'mine' : 'theirs'}`;
        msgDiv.id = id;
        
        // Load sender profile
        let profile = userProfileCache[data.uid];
        if (!profile) {
            profile = await loadUserProfile(data.uid);
        }
        
        const displayName = profile.displayName || data.name;
        const avatarURL = profile.avatarURL;
        const avatarColor = profile.color;
        const userInitial = getUserInitial(displayName);
        
        // Set reply onclick
        const safeName = displayName.replace(/'/g, "\\'");
        const safeText = (data.message || '').replace(/'/g, "\\'");
        msgDiv.setAttribute('onclick', `setReply('${id}', '${data.uid}', '${safeName}', '${safeText}')`);

        // Avatar HTML
        let avatarHtml = '';
        if (avatarURL) {
            avatarHtml = `<div class="msg-avatar"><img src="${avatarURL}" alt="${userInitial}"></div>`;
        } else {
            avatarHtml = `<div class="msg-avatar" style="background: ${avatarColor}">${userInitial}</div>`;
        }

        // Reply context
        let replyHtml = '';
        if (data.reply) {
            let repliedName = data.reply.name;
            if (data.reply.uid && userProfileCache[data.reply.uid]) {
                repliedName = userProfileCache[data.reply.uid].displayName || repliedName;
            }
            replyHtml = `<div class="reply-context">
                <i class="fas fa-reply" style="margin-right: 6px; color:#4f46e5;"></i>
                <strong>${repliedName}</strong> ${data.reply.text}
            </div>`;
        }

        // Content
        let contentHtml = '';
        if (data.fileData) {
            const f = data.fileData;
            if (f.isVoice) {
                contentHtml = `
                    <div class="msg-header">
                        ${avatarHtml}
                        <span class="msg-name">${displayName}</span>
                    </div>
                    <div class="msg-content">
                        <audio controls src="${f.url}"></audio>
                        <small style="display:block; margin-top:4px;"><i class="fas fa-microphone"></i> voice note</small>
                    </div>`;
            } else if (f.type.startsWith('image/')) {
                contentHtml = `
                    <div class="msg-header">
                        ${avatarHtml}
                        <span class="msg-name">${displayName}</span>
                    </div>
                    <div class="msg-content">
                        <a href="${f.url}" target="_blank"><img src="${f.url}"></a>
                    </div>`;
            } else {
                contentHtml = `
                    <div class="msg-header">
                        ${avatarHtml}
                        <span class="msg-name">${displayName}</span>
                    </div>
                    <div class="msg-content">
                        <a href="${f.url}" target="_blank">
                            <i class="fas fa-download"></i> ${f.name}
                        </a>
                    </div>`;
            }
        } else {
            contentHtml = `
                <div class="msg-header">
                    ${avatarHtml}
                    <span class="msg-name">${displayName}</span>
                </div>
                <div class="msg-content">
                    ${data.message || ''}
                </div>`;
        }

        // Timestamp and actions
        const timestamp = data.timestamp || new Date(data.dateSent).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        const deleteBtn = isMine ? `<button class="delete-btn" onclick="event.stopPropagation(); deleteMessage('${id}')"><i class="fas fa-trash-alt"></i></button>` : '';
        
        msgDiv.innerHTML = `${replyHtml}${contentHtml}<span class="msg-info">
            ${timestamp} 
            ${isMine ? '<span class="delivered-check" title="delivered"><i class="fas fa-check-double"></i></span>' : ''}
            ${deleteBtn}
        </span>`;
        
        chatBox.appendChild(msgDiv);
    }

    // Profile functions
    window.openProfileModal = function() {
        if (!currentUser) return;
        profileModal.style.display = 'flex';
        profileUsername.value = currentUser.displayName || currentUser.email.split('@')[0];
        profileEmail.value = currentUser.email;
        
        const initial = getUserInitial(currentUser.displayName || currentUser.email);
        avatarInitial.textContent = initial;
        
        db.ref(`users/${currentUser.uid}`).once('value', (snap) => {
            const data = snap.val();
            if (data?.avatarURL) {
                avatarPreview.src = data.avatarURL;
                avatarPreview.style.display = 'block';
                avatarInitial.style.display = 'none';
            }
        });
    };

    window.closeProfileModal = function() {
        profileModal.style.display = 'none';
    };

    window.uploadAvatar = async function(event) {
        const file = event.target.files[0];
        if (!file || !currentUser) return;
        
        if (!file.type.startsWith('image/')) {
            alert('Please select an image file');
            return;
        }

        // Preview
        const reader = new FileReader();
        reader.onload = (e) => {
            avatarPreview.src = e.target.result;
            avatarPreview.style.display = 'block';
            avatarInitial.style.display = 'none';
        };
        reader.readAsDataURL(file);

        // Upload
        const storageRef = storage.ref(`avatars/${currentUser.uid}/${Date.now()}_${file.name}`);
        
        try {
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            
            // Update database
            await db.ref(`users/${currentUser.uid}`).update({ 
                avatarURL: url,
                displayName: currentUser.displayName,
                email: currentUser.email
            });
            
            // Update cache
            if (userProfileCache[currentUser.uid]) {
                userProfileCache[currentUser.uid].avatarURL = url;
            }
            
            // Update mini avatar
            avatarMiniImg.src = url;
            avatarMiniImg.style.display = 'block';
            avatarMiniInitial.style.display = 'none';
            
            document.getElementById('profile-message').textContent = 'Avatar updated!';
            setTimeout(() => document.getElementById('profile-message').textContent = '', 2000);
        } catch (error) {
            alert('Upload failed: ' + error.message);
        }
    };

    window.saveProfile = function() {
        if (!currentUser) return;
        const newUsername = profileUsername.value.trim();
        if (!newUsername) return alert('Username cannot be empty');
        
        currentUser.updateProfile({ displayName: newUsername })
            .then(() => {
                return db.ref(`users/${currentUser.uid}`).update({ 
                    displayName: newUsername,
                    email: currentUser.email
                });
            })
            .then(() => {
                if (userProfileCache[currentUser.uid]) {
                    userProfileCache[currentUser.uid].displayName = newUsername;
                }
                
                userDisplayName.textContent = newUsername;
                avatarMiniInitial.textContent = getUserInitial(newUsername);
                
                document.getElementById('profile-message').textContent = 'Profile updated!';
                setTimeout(() => {
                    document.getElementById('profile-message').textContent = '';
                    profileModal.style.display = 'none';
                }, 1500);
            })
            .catch(err => alert(err.message));
    };

    // Auth functions
    window.toggleAuthUI = () => currentUser ? auth.signOut() : showLoginOverlay();
    
    function showLoginOverlay() {
        loginOverlay.style.display = 'flex';
        forgotPasswordOverlay.style.display = 'none';
    }

    window.showForgotPassword = function() {
        loginOverlay.style.display = 'none';
        forgotPasswordOverlay.style.display = 'flex';
    };

    window.hideForgotPassword = function() {
        forgotPasswordOverlay.style.display = 'none';
        loginOverlay.style.display = 'flex';
    };

    window.registerUser = async () => {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        authError.textContent = '';
        
        if (!email || !password) {
            authError.textContent = "Please enter email and password";
            return;
        }
        
        try {
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            const username = email.split('@')[0];
            await cred.user.updateProfile({ displayName: username });
            
            // Create user profile
            await db.ref(`users/${cred.user.uid}`).set({
                email: email,
                displayName: username,
                createdAt: Date.now(),
                avatarURL: null
            });
            
            loginOverlay.style.display = 'none';
        } catch (e) {
            authError.textContent = e.message;
        }
    };

    window.loginUser = async () => {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        authError.textContent = '';
        
        if (!email || !password) {
            authError.textContent = "Please enter email and password";
            return;
        }
        
        try {
            await auth.signInWithEmailAndPassword(email, password);
            loginOverlay.style.display = 'none';
        } catch (e) {
            if (e.code === 'auth/user-not-found') {
                authError.textContent = "User not found. Please register first.";
            } else if (e.code === 'auth/wrong-password') {
                authError.textContent = "Incorrect password.";
            } else {
                authError.textContent = e.message;
            }
        }
    };

    window.sendPasswordReset = async function() {
        const email = document.getElementById('reset-email').value.trim();
        resetMessage.innerHTML = '';
        
        if (!email) {
            resetMessage.innerHTML = '<div class="reset-message error">Please enter your email</div>';
            return;
        }

        resetMessage.innerHTML = '<div class="reset-message">Sending reset email...</div>';
        
        try {
            await auth.sendPasswordResetEmail(email);
            resetMessage.innerHTML = '<div class="reset-message success">Password reset email sent! Check your inbox.</div>';
            document.getElementById('reset-email').value = '';
            
            setTimeout(() => {
                hideForgotPassword();
            }, 3000);
        } catch (error) {
            let errorMsg = '';
            if (error.code === 'auth/user-not-found') {
                errorMsg = 'No account found with this email.';
            } else if (error.code === 'auth/invalid-email') {
                errorMsg = 'Invalid email format.';
            } else {
                errorMsg = error.message;
            }
            resetMessage.innerHTML = `<div class="reset-message error">${errorMsg}</div>`;
        }
    };

    // Message functions
    window.deleteMessage = (id) => {
        if (!currentUser) return alert("Login required");
        if (!confirm("Delete message?")) return;
        
        messagesRef.child(id).once('value', snap => {
            const data = snap.val();
            if (!data || data.uid !== currentUser.uid) {
                alert("Cannot delete this message");
                return;
            }
            snap.ref.remove();
        });
    };

    window.setReply = (id, uid, name, text) => {
        if (!currentUser) return alert("Login to reply");
        document.querySelector('.msg.selected-for-reply')?.classList.remove('selected-for-reply');
        document.getElementById(id)?.classList.add('selected-for-reply');
        replyToMessage = { id, uid, name, text };
        document.getElementById('reply-preview-name').innerHTML = `<i class="fas fa-reply-all"></i> ${name}`;
        document.getElementById('reply-preview-text').innerText = text;
        document.getElementById('reply-preview').style.display = 'flex';
    };
    
    window.clearReply = () => {
        document.querySelector('.msg.selected-for-reply')?.classList.remove('selected-for-reply');
        replyToMessage = null;
        document.getElementById('reply-preview').style.display = 'none';
    };

    window.sendMessage = () => {
        if (!currentUser || messageInput.disabled) return;
        const text = messageInput.value.trim();
        if (!text) return;
        
        const now = Date.now();
        const time = new Date(now).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        
        const messageData = {
            uid: currentUser.uid,
            name: currentUser.displayName || currentUser.email.split('@')[0],
            message: text,
            timestamp: time,
            dateSent: now
        };
        
        if (replyToMessage) {
            messageData.reply = {
                id: replyToMessage.id,
                uid: replyToMessage.uid,
                name: replyToMessage.name,
                text: replyToMessage.text
            };
        }
        
        messagesRef.push(messageData);
        messageInput.value = '';
        clearReply();
    };

    window.startVoiceRecording = async function() {
        if (!currentUser) return alert("Login required");
        if (mediaRecorder?.state === 'recording') {
            mediaRecorder.stop();
            return;
        }
        
        try {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(audioStream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const file = new File([blob], `voice_${Date.now()}.webm`, { type: 'audio/webm' });
                voiceNoteButton.classList.remove('recording');
                voiceNoteButton.innerHTML = '<i class="fas fa-microphone-alt"></i>';
                messageInput.disabled = false;
                audioStream.getTracks().forEach(t => t.stop());
                uploadFile(file, true);
            };
            
            mediaRecorder.start();
            voiceNoteButton.classList.add('recording');
            voiceNoteButton.innerHTML = '<i class="fas fa-stop"></i>';
            messageInput.value = 'Recording...';
            messageInput.disabled = true;
        } catch (err) {
            alert("Microphone error: " + err.message);
        }
    };

    window.uploadFile = async (file, isVoice = false) => {
        if (!currentUser || !file) return;
        
        const storageRef = storage.ref(`files/${currentUser.uid}/${Date.now()}_${file.name}`);
        messageInput.value = 'Uploading...';
        messageInput.disabled = true;
        
        try {
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            const now = Date.now();
            const time = new Date(now).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            const fileData = {
                uid: currentUser.uid,
                name: currentUser.displayName || currentUser.email.split('@')[0],
                timestamp: time,
                dateSent: now,
                fileData: {
                    name: file.name,
                    url: url,
                    type: file.type,
                    size: file.size,
                    isVoice: isVoice
                }
            };
            
            if (replyToMessage) {
                fileData.reply = {
                    id: replyToMessage.id,
                    uid: replyToMessage.uid,
                    name: replyToMessage.name,
                    text: replyToMessage.text
                };
            }
            
            await messagesRef.push(fileData);
            messageInput.value = '';
            messageInput.disabled = false;
            document.getElementById('file-input').value = '';
            clearReply();
        } catch (error) {
            alert("Upload failed: " + error.message);
            messageInput.disabled = false;
        }
    };

    // Load messages
    async function loadMessages() {
        loadingIndicator.style.display = 'flex';
        chatBox.innerHTML = '';
        chatBox.appendChild(loadingIndicator);
        
        try {
            const snapshot = await messagesRef.orderByChild('dateSent').limitToLast(50).once('value');
            
            // Load all user profiles first
            const uids = new Set();
            snapshot.forEach(child => {
                const data = child.val();
                uids.add(data.uid);
                if (data.reply?.uid) uids.add(data.reply.uid);
            });
            
            await Promise.all([...uids].map(uid => loadUserProfile(uid)));
            
            // Clear and render messages
            chatBox.innerHTML = '';
            const messages = [];
            snapshot.forEach(child => {
                messages.push({ id: child.key, data: child.val() });
            });
            
            // Render in order
            for (const msg of messages) {
                await renderMessage(msg.id, msg.data);
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            console.error("Error loading messages:", error);
        } finally {
            loadingIndicator.style.display = 'none';
        }
    }

    // Auth state observer
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        
        if (user) {
            // Load user profile
            await loadUserProfile(user.uid);
            
            const displayName = user.displayName || user.email.split('@')[0];
            userDisplayName.textContent = displayName;
            authButton.innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
            inputArea.style.display = 'flex';
            loggedOutMessage.style.display = 'none';
            profileButton.style.display = 'flex';
            
            // Update mini avatar
            const profile = userProfileCache[user.uid];
            if (profile?.avatarURL) {
                avatarMiniImg.src = profile.avatarURL;
                avatarMiniImg.style.display = 'block';
                avatarMiniInitial.style.display = 'none';
            } else {
                avatarMiniInitial.textContent = getUserInitial(displayName);
                avatarMiniInitial.style.display = 'flex';
                avatarMiniImg.style.display = 'none';
            }
            
            // Load messages
            loadMessages();
            
            // Listen for new messages
            messagesRef.limitToLast(1).on('child_added', async (snapshot) => {
                const id = snapshot.key;
                const data = snapshot.val();
                
                if (!document.getElementById(id)) {
                    await loadUserProfile(data.uid);
                    if (data.reply?.uid) {
                        await loadUserProfile(data.reply.uid);
                    }
                    await renderMessage(id, data);
                    
                    // Auto-scroll if near bottom
                    if (chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 400) {
                        chatBox.scrollTop = chatBox.scrollHeight;
                    }
                }
            });
            
        } else {
            userDisplayName.textContent = 'Guest';
            authButton.innerHTML = '<i class="fas fa-right-to-bracket"></i> Login';
            inputArea.style.display = 'none';
            loggedOutMessage.style.display = 'block';
            profileButton.style.display = 'none';
            chatBox.innerHTML = '<div id="loading-indicator"><i class="fas fa-spinner fa-pulse"></i> Please log in</div>';
            
            // Clear listeners
            messagesRef.off('child_added');
        }
    });

    // Listen for deleted messages
    messagesRef.on('child_removed', (snapshot) => {
        const el = document.getElementById(snapshot.key);
        if (el) el.remove();
        if (replyToMessage?.id === snapshot.key) clearReply();
    });
</script>
</body>
</html>
